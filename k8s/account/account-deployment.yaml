apiVersion: apps/v1
kind: Deployment
metadata:
  name: account
  namespace: amerbank
  labels:
    app: account

spec:
  replicas: 1

  selector:
    matchLabels:
      app: account

  template:
    metadata:
      labels:
        app: account

    spec:
      initContainers:
        - name: wait-for-config-server
          image: busybox
          command: [ 'sh', '-c', 'until wget -qO- http://config-server:8080/actuator/health | grep -q "UP"; do echo "Waiting for config-server..."; sleep 5; done' ]

        - name: wait-for-discovery
          image: busybox
          command: [ 'sh', '-c', 'until wget -qO- http://discovery:8761/actuator/health | grep -q "UP"; do echo "Waiting for discovery..."; sleep 5; done' ]

        - name: wait-for-postgres
          image: busybox
          command: [ 'sh', '-c', 'until nc -z postgres 5432; do echo "Waiting for postgres..."; sleep 3; done' ]

        - name: wait-for-redis
          image: redis:alpine
          command: [ 'sh', '-c', 'until redis-cli -h redis ping; do echo "Waiting for redis..."; sleep 3; done' ]

      containers:
        - name: account
          image: account:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: account-config

          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: account-secret
                  key: db-username

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: account-secret
                  key: db-password

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: account-secret
                  key: jwt-secret

            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                secretKeyRef:
                  name: account-secret
                  key: spring-profiles-active

            - name: CONFIG_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: account-secret
                  key: config-server-url

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3

          lifecycle:
            preStop:
              exec:
                command: [ "sh", "-c", "sleep 5" ]

      terminationGracePeriodSeconds: 30