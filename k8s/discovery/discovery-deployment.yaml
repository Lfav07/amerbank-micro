apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery
  namespace: amerbank
  labels:
    app: discovery

spec:
  replicas: 1

  selector:
    matchLabels:
      app: discovery

  template:
    metadata:
      labels:
        app: discovery

    spec:
      initContainers:
        - name: wait-for-config-server
          image: busybox
          command: ['sh', '-c', 'until wget -qO- http://config-server:8080/actuator/health | grep -q "UP"; do echo "Waiting for config-server..."; sleep 5; done']

      containers:
        - name: discovery
          image: discovery:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8761

          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                secretKeyRef:
                  name: discovery-secret
                  key: spring-profiles-active

            - name: CONFIG_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: discovery-secret
                  key: config-server-url

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3

          lifecycle:
            preStop:
              exec:
                command: [ "sh", "-c", "sleep 5" ]

      terminationGracePeriodSeconds: 30
