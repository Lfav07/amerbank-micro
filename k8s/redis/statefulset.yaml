apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: amerbank
  labels:
    app: redis

spec:
  serviceName: redis
  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis
          image: redis:7.2
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 6379
              name: redis

          command: ["redis-server", "--appendonly", "yes"]

          volumeMounts:
            - name: redis-data
              mountPath: /data

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"

          readinessProbe:
            exec:
              command: ["redis-cli", "--raw", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          livenessProbe:
            exec:
              command: ["redis-cli", "--raw", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
