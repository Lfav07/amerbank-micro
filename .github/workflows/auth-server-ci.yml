name: Auth Server CI/CD

on:
  push:
    branches:
      - main
      - feature/ci-pipelines
    paths:
      - 'services/auth-server/**'
      - '.github/workflows/**'

  pull_request:
    branches:
      - main
    paths:
      - 'services/auth-server/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/auth-server

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'maven'

      - name: Make mvnw executable
        working-directory: 'services/auth-server'
        run: chmod +x mvnw

      - name: Build, test and package
        working-directory: 'services/auth-server'
        run: ./mvnw clean verify

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        if: ${{ github.ref == 'refs/heads/main' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}

        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        if: ${{ github.ref == 'refs/heads/main' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}


        working-directory: 'services/auth-server'
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-server:${{ env.IMAGE_TAG }} .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-server:latest .

      - name: Push Docker image
        if: ${{ github.ref == 'refs/heads/main' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/auth-server:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.DOCKER_USERNAME }}/auth-server:latest
