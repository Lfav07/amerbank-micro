name: Auth Server CI

on:
  push:
    branches:
      - main
      - feature/ci-pipelines
    paths:
      - 'services/auth-server/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'services/auth-server/**'


jobs:
  build:
    runs-on: ubuntu-latest



    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/auth-server

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'maven'

      - name: Make mvnw executable
        working-directory: 'services/auth-server'
        run: chmod +x mvnw

      - name: Build with Maven
        working-directory: 'services/auth-server'
        run: ./mvnw clean verify