name: Transaction Service CD

on:
  workflow_run:
    workflows: ["Transaction Service CI"]
    branches: [main]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && vars.ENABLE_CD == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/transaction

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'maven'

      - name: Make mvnw executable
        working-directory: 'services/transaction'
        run: chmod +x mvnw

      - name: Build package
        working-directory: 'services/transaction'
        run: ./mvnw clean package -DskipTests

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        working-directory: 'services/transaction'
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/transaction:${{ env.IMAGE_TAG }} .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/transaction:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/transaction:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.DOCKER_USERNAME }}/transaction:latest