on:
  push:
    branches: [main]
    paths:
      - 'services/auth-server/**'
      - '.github/workflows/service-auth.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/auth-server/**'

env:
  SERVICE_NAME: auth-server
  SERVICE_PATH: services/auth-server
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'corretto'
jobs:
  commit-stage:
    name: Build, Test & Package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Starting commit stage
        run: |
          echo "=========================================="
                echo "  COMMIT STAGE - ${{ env.SERVICE_NAME }}"
                echo "=========================================="
                echo "Branch: ${{ github.ref_name }}"
                echo "Commit: ${{ github.sha }}"
                echo "Author: ${{ github.actor }}"
                echo "=========================================="
      # Code checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify structure
        run: |
          echo "Listing service files"
          ls -la ${{ env.SERVICE_PATH }}
          echo ""
          echo "Verifying pom.xml..."
          if [ -f "${{ env.SERVICE_PATH }}/pom.xml" ]; then
            echo "pom.xml found"
          else
            echo "pom.xml not found"
            exit 1
          fi


      - name: Setup java ${{ env.JAVA_VERSION }} (${{ env.JAVA_DISTRIBUTION }})
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Verify Java installation
        run: |
            echo "Java version installed:"
            java -version
            echo ""
            echo "Maven version:"
            mvn -version
        #Compile
      - name: Compile application
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          echo "Compiling project..."
          mvn clean compile -B -V
          echo "Successfully compiled project"

      - name: Show compilation statistics
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
            echo "Compilated classes:"
            find target/classes -name "*.class" | wc -l
      - name: Run unit tests
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
            echo "Running unit tests"
            mvn test -B
            echo "Unit tests successfully passed"
      - name: Tests report
        if: always()
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
            echo "Tests summary:"
          if ls target/surefire-reports/TEST-*.xml 1> /dev/null 2>&1; then          
          find target/surefire-reports -name "TEST-*.xml" -exec grep -h "testsuite" {} \; | head -5
            else
              echo "No tests summary found"
             fi
      - name: Generate coverage report
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
            echo "Generating coverage report..."
            mvn jacoco:report -B
            echo "Report Generated"

      - name: Verify minimum coverage (70%)
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
             echo "Verifying code coverage..."
             mvn jacoco:check -B
             cho "Minimum coverage hit"

      - name: Upload coverage statistics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: ${{ env.SERVICE_PATH }}/target/site/jacoco/
          retention-days: 30