server:
  port: 8083

spring:
  application:
    name: account

  datasource:
    url: jdbc:postgresql://localhost:5432/amerbank?currentSchema=account
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  cache:
    type: redis

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    schemas: account
    enabled: true
    locations: classpath:db/migration/account

jwt:
  secret: ${JWT_SECRET}

account:
  prefix: "ACCT"
  body-digits: 10
  upper-bound: 10000000000
  max-attempts: 5

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
