spring:
  cloud:
    config:
      enabled: false

  cache:
    type: redis

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000

  jpa:
    hibernate:
      ddl-auto: validate
      show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration/account

jwt:
  secret: "testsecret123456789test123456789secret"

account:
  prefix: "ACCT"
  body-digits: 10
  upper-bound: 10000000000
  max-attempts: 5
  initial-balance: 1000.00

eureka:
  client:
    enabled: false