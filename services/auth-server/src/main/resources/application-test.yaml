spring:
  cloud:
    config:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
      show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration/auth
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: auth-server
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.trusted.packages: "*"
eureka:
  client:
    enabled: false
jwt:
  secret: "testsecret123456789test123456789secret"
  expirationMs: 3600000
  serviceTokenExpirationMs: 120000
logging:
  level:
    org.apache.kafka: OFF
    kafka: OFF
    org.apache.kafka.clients.producer: OFF
    org.apache.kafka.clients.consumer: OFF
    org.apache.kafka.streams: ERROR

