server:
  port: 8888

spring:
  application:
    name: config-server

  profiles:
    active: native

  cloud:
    config:
      server:
        native:
          # Local directory where config files are stored
          # Can be `classpath:/configurations` or a local folder
          search-locations: classpath:/configurations/
          # If you want to use git repo, configure like:
          # git:
          #   uri: https://github.com/yourorg/config-repo.git
          #   search-paths: auth-server

management:
  endpoints:
    web:
      exposure:
        include: '*'
