spring:
  application:
    name: customer
  datasource:
    url: jdbc:postgresql://localhost:5432/amerbank
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
jpa:
  hibernate:
    ddl-auto: update
    show-sql: true
  flyway:
    enabled: false
  cloud:
    config:
      enabled: false
      fail-fast: true
      label: main
