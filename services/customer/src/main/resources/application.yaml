server:
  port: 8082

spring:
  application:
    name: customer
  datasource:
    url: jdbc:postgresql://localhost:5432/amerbank?currentSchema=customer
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    outOfOrder: true
    schemas: customer
    enabled: true
    locations: classpath:db/migration/customer

cloud:
  config:
    enabled: false
    fail-fast: true
    label: main

jwt:
  secret: u7SKcmP9z3LfA6NvTyExB1QdReGmZx2W
